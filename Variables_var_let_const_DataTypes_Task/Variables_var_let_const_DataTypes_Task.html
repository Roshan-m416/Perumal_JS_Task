<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JS Variables Example</title>
</head>

<body>

    <h2>Check the Console (Press F12)</h2>

    <script>
        // Using var
        var name = "Perumal";
        console.log("var:", name);

        // Using let
        let age = 22;
        console.log("let:", age);

        // Using const
        const country = "India";
        console.log("const:", country);

        // String
        let firstName = "Perumal";
        console.log("String:", firstName);

        // Number
        let marks = 85;
        console.log("Number:", marks);

        // Boolean
        let isStudent = true;
        console.log("Boolean:", isStudent);

        // Null
        let emptyValue = null;
        console.log("Null:", emptyValue);

        // Undefined
        let address;
        console.log("Undefined:", address);
    </script>

</body>

</html>
